services:
  # 富途行情網關
  futuopend:
    image: ostai/futuopend:latest
    platform: linux/amd64
    container_name: futuopend
    ports:
      - "127.0.0.1:11111:11111"
      - "127.0.0.1:33333:33333"
      - "127.0.0.1:8081:8081"
    environment:
      - FUTU_LOGIN_ACCOUNT=${FUTU_LOGIN_ACCOUNT}
      - FUTU_LOGIN_PWD_MD5=${FUTU_LOGIN_PWD_MD5}
      - MARKET_HK=1
      - MARKET_US=1
      - MARKET_CN=0
      # 允許非本地連接（for Docker network）
      - FUTU_TRADE_CONN_NO_ENCRYPTION=yes
    volumes:
      - futuopend_data:/root/.com.futunn.FutuOpenD
    restart: unless-stopped
    networks:
      - vcp-network

  # Python Backend
  backend:
    build: ./backend
    container_name: vcp-backend
    ports:
      - "127.0.0.1:8000:8000"
    environment:
      - FUTU_HOST=futuopend
      - FUTU_PORT=11111
      - FUTU_TRADE_PWD=${FUTU_TRADE_PWD}
      - PORT=8000
    depends_on:
      - futuopend
    restart: unless-stopped
    networks:
      - vcp-network
    volumes:
      - backend_data:/app

  # Web應用 (Next.js Frontend)
  vcp-calculator:
    build: .
    container_name: vcp-calculator
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PYTHON_API_URL=http://backend:8000
      - FUTU_HOST=futuopend
      - FUTU_PORT=11111
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - vcp-network

volumes:
  backend_data:
  futuopend_data:

networks:
  vcp-network:
    driver: bridge
