services:
  # 富途行情網關 (本地直接跑，唔放入 Docker - 因為交易接口唔需要加密)
  # 如果你想將 OpenD 都放入 Docker，必須先喺 OpenD 設定入面開啟 RSA 加密並配置私鑰
  # 詳情睇: https://openapi.futunn.com/futu-api-doc/en/opend/opend-cmd.html
  #
  # 本地跑 OpenD 嘅好處：
  # 1. 唔需要配置 RSA 加密 (交易接口允許 localhost 唔加密)
  # 2. 方便調試，睇得到 GUI
  # 3. 唔需要重複搞 SMS 驗證
  #
  # 確保你本地 OpenD 登入成功，並且喺 Setting 入面確認：
  # - API Listening Address: 127.0.0.1 (預設)
  # - API Port: 11111 (預設)

  # Python Backend
  backend:
    build: ./backend
    container_name: vcp-backend
    ports:
      - "8000:8000"
    environment:
      # 本地跑 OpenD 用 host.docker.internal (Mac/Windows) 或 172.17.0.1 (Linux)
      # 如果你 Mac 用 Docker Desktop，呢個係預設閘道 IP
      - FUTU_HOST=host.docker.internal
      - FUTU_PORT=11111
      - FUTU_TRADE_PWD=${FUTU_TRADE_PWD}
      - PORT=8000
    extra_hosts:
      # 允許 container 訪問本機 - Mac/Windows Docker Desktop 適用
      - "host.docker.internal:host-gateway"
    restart: unless-stopped
    networks:
      - vcp-network

  # Web應用 (Next.js Frontend)
  vcp-calculator:
    build: .
    container_name: vcp-calculator
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PYTHON_API_URL=http://backend:8000
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - vcp-network

networks:
  vcp-network:
    driver: bridge
