# =============================================================================
# VPS 部署版本 - Position Calculator
# =============================================================================
# OpenD 獨立安裝喺主機（唔喺 Docker 入面）
# 詳情睇: https://openapi.futunn.com/futu-api-doc/en/opend/opend-install.html
#
# 確認 OpenD 設定：
#   - API Listening Address: 0.0.0.0（必須！唔可以係 127.0.0.1）
#   - API Port: 11111
#   - 交易接口：設定交易密碼
#
# 使用方法：
#   docker compose -f docker-compose.vps.yml up -d
#
# =============================================================================

services:
  # ==========================================================================
  # Python Backend (FastAPI)
  # ==========================================================================
  backend:
    build: ./backend
    container_name: vcp-backend
    ports:
      - "127.0.0.1:8000:8000"  # 只監聽本地 loopback，Nginx 從本地 proxy
    environment:
      # OpenD 喺主機運行，Linux Docker 用 gateway IP (172.17.0.1)
      - FUTU_HOST=172.17.0.1
      - FUTU_PORT=11111
      - FUTU_TRADE_PWD=${FUTU_TRADE_PWD}
      - PORT=8000
      # 停用日誌寫入，避免權限問題（沙盒 / VPS 都適用）
      - FUTU_DISABLE_LOG=1
    restart: unless-stopped
    networks:
      - vcp-network

  # ==========================================================================
  # Next.js Frontend
  # ==========================================================================
  vcp-calculator:
    build: .
    container_name: vcp-calculator
    ports:
      - "127.0.0.1:3000:3000"  # 只監聽本地 loopback，Nginx 從本地 proxy
    environment:
      - NODE_ENV=production
      - PYTHON_API_URL=http://backend:8000
      - APP_PASSWORD=${APP_PASSWORD:-}  # 訪問密碼（見下方説明）
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - vcp-network

networks:
  vcp-network:
    driver: bridge

# =============================================================================
# 安全設定説明
# =============================================================================
# 1. 所有 service ports 只監聽 127.0.0.1，防止被公網直接訪問
# 2. 請確保 Nginx 配置正確，使用 HTTPS + Basic Auth 或其他認證方式
#
# 建議的 Nginx 配置：
#   - 強制 HTTPS
#   - 添加 Basic Auth 密碼保護
#   - 配置 SSL 證書 (Let's Encrypt)
# =============================================================================
