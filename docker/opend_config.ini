# =============================================================================
# Futu OpenD 配置文件 (opend_config.ini)
# =============================================================================
# 放置於 docker/opend_config.ini
# OpenD 會自動讀取此配置
#
# ⚠️ 重要：ip 必須設為 0.0.0.0，等 Docker 網絡內的其他容器可以連接
# ⚠️ 千祈唔好設為 127.0.0.1！
# =============================================================================

[base]
# 你的富途 App ID (從富途後台獲取)
app_id = 你的AppID

# 自動重連
auto_reconnect = true

# 你的富途 Secret Key
secret_key = 你的SecretKey

[server]
# ⚠️ 必須設為 0.0.0.0，等 Docker 網絡可以訪問
ip = 0.0.0.0

# API 端口 (供 Backend 連接)
port = 11111

# WebSocket 端口 (如果需要的話)
websocket_port = 8081

[trade]
# 加密類型：0 = 不加密 (僅 localhost)，1 = RSA 加密
encrypt_type = 1

# RSA 私鑰路徑 (相對於 FutuOpenD 目錄)
# 這個會通過 volume mount 映射進來
private_key_path = ./keys/private_key.pem

# 交易環境：SIMULATE 或 REAL
# 建議先用 SIMULATE 測試
trd_env = SIMULATE

[log]
# 日誌級別
log_level = INFO

# 日誌目錄
log_path = ./logs
